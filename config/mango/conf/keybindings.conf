# Key Bindings
# key name refer to `xev` or `wev` command output,
# mod keys name: super,ctrl,alt,shift,none

# reload config
bind=SUPER,r,reload_config

# menu and terminal
bind=ALT,o,spawn,omvoid-app-menu 
bind=ALT,Return,spawn,alacritty

# exit
bind=SUPER+ALT+SHIFT,m,quit
bind=ALT,c,killclient,

# switch window focus
bind=SUPER,Tab,focusstack,next
bind=ALT,Left,focusdir,left
bind=ALT,Right,focusdir,right
bind=ALT,Up,focusdir,up
bind=ALT,Down,focusdir,down# swap window
bind=SUPER+SHIFT,Up,exchange_client,up
bind=SUPER+SHIFT,Down,exchange_client,down
bind=SUPER+SHIFT,Left,exchange_client,left
bind=SUPER+SHIFT,Right,exchange_client,right

# switch window status
bind=SUPER,g,toggleglobal,
bind=ALT,Tab,toggleoverview,
bind=ALT+SHIFT,space,togglefloating,
bind=ALT,y,togglemaximizescreen,
bind=ALT+SHIFT,f,togglefullscreen,
bind=ALT+SHIFT+SUPER,f,togglefakefullscreen,
bind=SUPER,i,minimized,
bind=SUPER,o,toggleoverlay,
bind=SUPER+SHIFT,I,restore_minimized
bind=ALT,z,toggle_scratchpad

# scroller layout
bind=ALT,e,set_proportion,1.0
bind=ALT,x,switch_proportion_preset,

# switch layout
bind=SUPER,n,switch_layout
bind=SUPER,d,setlayout,scroller

# tag switch
bind=SUPER,Left,viewtoleft,0
bind=CTRL,Left,viewtoleft_have_client,0
bind=SUPER,Right,viewtoright,0
bind=CTRL,Right,viewtoright_have_client,0
bind=CTRL+SUPER,Left,tagtoleft,0
bind=CTRL+SUPER,Right,tagtoright,0

bind=ALT,1,view,1,0
bind=ALT,2,view,2,0
bind=ALT,3,view,3,0
bind=ALT,4,view,4,0
bind=ALT,5,view,5,0
bind=ALT,6,view,6,0
bind=ALT,7,view,7,0
bind=ALT,8,view,8,0
bind=ALT,9,view,9,0

# tag: move client to the tag and focus it
# tagsilent: move client to the tag and not focus it
# bind=ALT,1,tagsilent,1
bind=ALT+SHIFT,1,tag,1,0
bind=ALT+SHIFT,2,tag,2,0
bind=ALT+SHIFT,3,tag,3,0
bind=ALT+SHIFT,4,tag,4,0
bind=ALT+SHIFT,5,tag,5,0
bind=ALT+SHIFT,6,tag,6,0
bind=ALT+SHIFT,7,tag,7,0
bind=ALT+SHIFT,8,tag,8,0
bind=ALT+SHIFT,9,tag,9,0

# monitor switch
bind=alt+shift,Left,focusmon,left
bind=alt+shift,Right,focusmon,right
bind=SUPER+ALT,Left,tagmon,left
bind=SUPER+ALT,Right,tagmon,right

# gaps
bind=ALT+SHIFT,X,incgaps,1
bind=ALT+SHIFT,Z,incgaps,-1
bind=ALT+SHIFT,R,togglegaps

# movewin
bind=CTRL+SHIFT,Up,movewin,+0,-50
bind=CTRL+SHIFT,Down,movewin,+0,+50
bind=CTRL+SHIFT,Left,movewin,-50,+0
bind=CTRL+SHIFT,Right,movewin,+50,+0

# resizewin
bind=CTRL+ALT,Up,resizewin,+0,-50
bind=CTRL+ALT,Down,resizewin,+0,+50
bind=CTRL+ALT,Left,resizewin,-50,+0
bind=CTRL+ALT,Right,resizewin,+50,+0

# Mouse Button Bindings
# btn_left and btn_right can't bind none mod key
mousebind=SUPER,btn_left,moveresize,curmove
mousebind=NONE,btn_middle,togglemaximizescreen,0
mousebind=SUPER,btn_right,moveresize,curresize
mousebind=ALT,btn_left,moveresize,curresize
# Axis Bindings
axisbind=SUPER,UP,viewtoleft_have_client
axisbind=SUPER,DOWN,viewtoright_have_client
# Gesturebind
gesturebind=none,left,4,focusdir,left
gesturebind=none,right,4,focusdir,right
gesturebind=none,up,4,focusdir,up
gesturebind=none,down,4,focusdir,down
gesturebind=none,left,3,viewtoright
gesturebind=none,right,3,viewtoleft
gesturebind=none,up,3,toggleoverview
gesturebind=none,down,3,toggleoverview

bind=SUPER,0,toggleoverview
bind=none,XF86AudioRaiseVolume, spawn, swayosd-client --output-volume 5
bind=none,XF86AudioLowerVolume, spawn, swayosd-client --output-volume -5
bind=none,XF86AudioMute, spawn, swayosd-client --output-volume mute-toggle
bind=none,XF86MonBrightnessUp, spawn, swayosd-client --brightness +10
bind=none,XF86MonBrightnessDown, spawn, swayosd-client --brightness -10
bind=none,XF86KbdBrightnessUp, spawn, ~/.config/hypr/scripts/kbdbacklight.sh up
bind=none,XF86KbdBrightnessDown, spawn, ~/.config/hypr/scripts/kbdbacklight.sh down
# Requires playerctl
bind=none,XF86AudioNext, spawn, playerctl next
bind=none,XF86AudioPause, spawn, playerctl play-pause
bind=none,XF86AudioPlay, spawn, playerctl play-pause
bind=none,XF86AudioPrev, spawn, playerctl previous
bind=ALT,r,spawn,omvoid-cmd-radio
bind=ALT,a,spawn,omvoid-audioswitcher
bind=ALT,v,spawn,rofi -modi clipboard:cliphist-rofi-img -show clipboard -show-icons -theme ~/.config/rofi/menu-style-clipboard.rasi
bind = ALT,t,spawn,setsid -f kitty -e tmux-start.sh
bind = ALT,n,spawn,rofi_notes.sh
bind = ALT, B, spawn, omvoid-launch-browser
bind = ALT, W, spawn, ~/.config/rofi/wallpaper/wallpaper-hypr.sh
bind = ALT, q, spawn, wlogout
bind = SUPER,f,spawn, setsid -f kitty -e yazi
bind = ALT,f,spawn, nautilus
bind = SUPER,s,spawn, ssh_launcher.sh
bind=SUPER,space,switch_keyboard_layout
bind=ALT,l,spawn,swaylock

